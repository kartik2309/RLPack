mode: 'train'
num_episodes: 10000
max_timesteps: 1000
model_name: 'dlqn1d'
reward_print_frequency: 100

model_args: {
  num_actions: 4,
  activation: 'relu',
  sequence_length: 1,
  hidden_sizes: [ 8, 64, 64, 64 ],
  dropout: 0.005
}

activation_args: {
}

agent_args: {
  gamma: 0.95,
  epsilon: 1,
  min_epsilon: 0.01,
  num_actions: 4,
  memory_buffer_size: 16384,
  target_model_update_rate: 128,
  policy_model_update_rate: 4,
  min_lr: 0.00005,
  model_backup_frequency: 1500,
  batch_size: 64,
  epsilon_decay_rate: 0.99,
  epsilon_decay_frequency: 64,
  apply_norm: "none",
  apply_norm_to: [ "none" ],
  tau: 0.95
}

optimizer_args: {
  optimizer: "adam",
  lr: 0.001,
  weight_decay: 0.001,
}

lr_scheduler_args: {
  "scheduler": "step_lr",
  "step_size": 128,
  "gamma": 0.9
}

device: 'cpu'