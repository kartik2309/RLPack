mode: 'train'
num_episodes: 10000
max_timesteps: 2000
model_name: 'dlqn1d'
reward_print_frequency: 100

model_args: {
  num_actions: 4,
  activation: 'relu',
  sequence_length: 1,
  hidden_sizes: [ 8, 32, 64 ],
  dropout: 0.5
}

activation_args: {
}

agent_args: {
  gamma: 0.95,
  epsilon: 1,
  min_epsilon: 0.01,
  num_actions: 4,
  memory_buffer_size: 16384,
  target_model_update_rate: 20,
  policy_model_update_rate: 4,
  batch_size: 32,
  epsilon_decay_rate: 0.98,
  epsilon_decay_frequency: 20,
  apply_norm: "none",
  apply_norm_to: [ "none" ]
}

optimizer_args: {
  optimizer: "adam",
  lr: 1e-3,
}

device: 'cpu-mps'